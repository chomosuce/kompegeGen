name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn --batch-mode --no-transfer-progress clean package

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/kompegeGen-1.0-SNAPSHOT.jar
